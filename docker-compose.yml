version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: logxpro-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - logxpro-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: logxpro-kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - logxpro-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: logxpro-logstash
    ports:
      - "5044:5044"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      - elasticsearch
    networks:
      - logxpro-net

  redis:
    image: redis:7-alpine
    container_name: logxpro-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - logxpro-net

  postgres:
    image: postgres:15-alpine
    container_name: logxpro-postgres
    environment:
      POSTGRES_DB: soc_engine
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: soc_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - logxpro-net

volumes:
  esdata:
    driver: local
  redisdata:
    driver: local
  pgdata:
    driver: local

networks:
  logxpro-net:
    driver: bridge
