id: credential_dumping
name: "Credential Dumping Detected"
description: "Fires when Mimikatz or LSASS dump techniques are detected (T1003.001)"
trigger_tier: [2, 3, 4]
matched_techniques:
  - T1003.001
  - T1003
  - T1078.002
actions:
  - type: notify
    message: "Credential dumping activity on {host} (User: {user}) — Tier {tier} — Lateral movement likely"
    severity: high

  - type: recommend
    text: >
      Credential dumping confirmed on {host}. Recommended steps:
      1. Immediately reset the KRBTGT account password (twice) to invalidate all Kerberos tickets.
      2. Reset credentials for {user} and all domain admin accounts.
      3. Scan all hosts for lateral movement artifacts (Event 4624 from {host}'s IP).
      4. Review LSASS memory dump artifacts and run EDR scan on the host.

  - type: enrich
    targets:
      - process_hash
      - parent_process_hash
      - source_ip

  - type: auto_response
    enabled: false
