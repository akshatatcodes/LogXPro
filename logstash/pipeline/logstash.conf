input {
  beats {
    port => 5044
    type => "winlogbeat"
  }
  tcp {
    port => 5000
    codec => json
    type => "manual_json"
  }
}

filter {
  # --- Ingestion timestamp: THE fix for clock-drift correlation issues ---
  ruby {
    code => "event.set('[event][ingested]', Time.now.utc.iso8601(3))"
  }

  # --- Only reshape data coming from Winlogbeat (manual_json is already ECS-shaped) ---
  if [type] == "winlogbeat" {

    mutate {
      add_field => {
        "[host][name]" => "%{[winlog][computer_name]}"
        "[event][code]" => "%{[winlog][event_id]}"
      }
    }

    # Sysmon Event ID 1 — Process Creation
    if [winlog][event_id] == 1 {
      mutate {
        rename => {
          "[winlog][event_data][Image]"              => "[process][executable]"
          "[winlog][event_data][CommandLine]"         => "[process][command_line]"
          "[winlog][event_data][ParentImage]"         => "[process][parent][executable]"
          "[winlog][event_data][ParentCommandLine]"   => "[process][parent][command_line]"
          "[winlog][event_data][ProcessGuid]"         => "[process][entity_id]"
          "[winlog][event_data][Hashes]"               => "[process][hash]"
          "[winlog][event_data][User]"                => "[user][name]"
        }
      }
    }

    # Sysmon Event ID 3 — Network Connection
    if [winlog][event_id] == 3 {
      mutate {
        rename => {
          "[winlog][event_data][Image]"           => "[process][executable]"
          "[winlog][event_data][SourceIp]"        => "[source][ip]"
          "[winlog][event_data][SourcePort]"      => "[source][port]"
          "[winlog][event_data][DestinationIp]"   => "[destination][ip]"
          "[winlog][event_data][DestinationPort]" => "[destination][port]"
        }
      }
    }

    # Sysmon Event ID 22 — DNS Query
    if [winlog][event_id] == 22 {
      mutate {
        rename => {
          "[winlog][event_data][QueryName]" => "[dns][question][name]"
          "[winlog][event_data][Image]"     => "[process][executable]"
        }
      }
    }

    # Security log — Logon events (4624 success, 4625 failed, 4672 special privilege, 4720 new account)
    if [winlog][event_id] in [4624, 4625, 4672, 4720] {
      mutate {
        rename => {
          "[winlog][event_data][TargetUserName]" => "[user][name]"
          "[winlog][event_data][IpAddress]"      => "[source][ip]"
        }
      }
    }

    # Clean up the raw winlog block once we've extracted what we need (optional, keeps documents smaller)
    mutate {
      remove_field => ["[agent]", "[ecs]", "[log]"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logxpro-logs-%{+YYYY.MM.dd}"
  }

  # Prints every event Logstash processes to the container logs — great for debugging
  stdout { codec => rubydebug }
}